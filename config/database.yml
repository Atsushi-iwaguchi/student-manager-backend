default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: postgres
  password: password
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: student_manager_backend_development

test:
  <<: *default
  database: student_manager_backend_test

production:
  primary:
    <<: *default
    database: student_manager_backend_production
  cache:
    <<: *default
    database: student_manager_backend_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: student_manager_backend_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: student_manager_backend_production_cable
    migrations_paths: db/cable_migrate
